services:

  # ── Frontend (Next.js) ────────────────────────────────────────────────────
  frontend:
    container_name: asktube-frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Baked into the Next.js bundle at build time
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost:8000}
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  # ── Backend (FastAPI) ─────────────────────────────────────────────────────
  backend:
    container_name: asktube-backend
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # ChromaDB HTTP client (connects to the chromadb service below)
      CHROMA_USE_HTTP: "true"
      CHROMA_HOST: chromadb
      CHROMA_PORT: "8000"
      CHROMA_COLLECTION_NAME: asktube_videos
      # Data directories
      AUDIO_CACHE_DIR: /app/data/audio_cache
      ANALYTICS_DATABASE_URL: sqlite+aiosqlite:///./data/analytics.db
      ANALYTICS_ENABLED: "true"
      PROMETHEUS_ENABLED: "true"
      # CORS — allowed frontend origins. Override in .env for production
      # (JSON array or comma-separated; defaults to local development origins).
      CORS_ORIGINS: '${CORS_ORIGINS:-["http://localhost:3000","http://127.0.0.1:3000"]}'
    volumes:
      - backend_data:/app/data
    depends_on:
      chromadb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 25s
    restart: unless-stopped

  # ── ChromaDB (vector store) ───────────────────────────────────────────────
  chromadb:
    container_name: asktube-chromadb
    image: chromadb/chroma:1.3.7
    ports:
      - "8001:8000"
    environment:
      IS_PERSISTENT: "TRUE"
      ANONYMIZED_TELEMETRY: "FALSE"
    volumes:
      - chroma_data:/data          # chromadb 1.x saves to /data by default
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/8000'"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s
    restart: unless-stopped

volumes:
  backend_data:
  chroma_data:
